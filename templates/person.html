<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ person.name }} — камень</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #16243a 0, #050811 60%, #020308 100%);
        color: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .streak-label {
        font-size: 16px;
        opacity: 0.8;
        margin-bottom: 22px;
      }
      .gem-wrapper {
        position: relative;
        width: 150px;
        height: 150px;
        margin-bottom: 12px;
        z-index: 2;
      }
      .gem-glow {
  position: absolute;
  inset: -28px;
  border-radius: 50%;
  filter: blur(10px);
  pointer-events: none;
  transition: background 0.4s ease-out, filter 0.4s ease-out;
  z-index: 0;
}
.gem-shape {
  position: relative;
  width: 100%;
  height: 100%;
  clip-path: polygon(50% 0%, 95% 35%, 80% 100%, 20% 100%, 5% 35%);
  transition: background 0.4s ease-out, box-shadow 0.4s ease-out;
  z-index: 1;
}

/* Активный сегодня камень (есть ореол и glow) */
.gem-active {
  background: {{ gradient }};
  box-shadow: {{ box_shadow }};
}
.gem-glow-active {
  background: {{ halo_bg }};
}

/* Неактивный сегодня камень (серый, без свечения) */
.gem-inactive {
  background: linear-gradient(135deg, #1c2d24, #0f1812);
  box-shadow: none;
}
.gem-glow-inactive {
  background: none;
}
      .name,
      .level,
      .subtitle,
      .bar-wrapper,
      .bar-label,
      .btn,
      .hint {
        position: relative;
        z-index: 5;
      }
      .name {
        font-size: 16px;
        margin-bottom: 4px;
        color: #c5ffda;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-shadow: 0 0 6px rgba(0,0,0,0.85);
      }
      .level {
        font-size: 13px;
        opacity: 0.9;
        margin-bottom: 8px;
        text-shadow: 0 0 4px rgba(0,0,0,0.85);
      }
      .subtitle {
        font-size: 14px;
        max-width: 280px;
        opacity: 0.9;
        margin-bottom: 18px;
        text-shadow: 0 0 4px rgba(0,0,0,0.9);
      }
      .bar-wrapper {
        width: 240px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        margin-bottom: 6px;
        box-shadow: 0 0 8px rgba(0,0,0,0.7);
      }
      .bar-fill {
        width: {{ progress }}%;
        height: 100%;
        background: linear-gradient(90deg, #3ceaaa, #9fe6b8);
        box-shadow: 0 0 10px rgba(76, 237, 165, 0.8);
        transition: width 0.3s ease-out;
      }
      .bar-label {
        font-size: 12px;
        opacity: 0.85;
        margin-bottom: 14px;
        text-shadow: 0 0 3px rgba(0,0,0,0.8);
      }
      .btn {
        border: none;
        outline: none;
        padding: 10px 18px;
        border-radius: 999px;
        background: linear-gradient(135deg, #3ceaaa, #2b9f73);
        color: #050811;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 0 12px rgba(76, 237, 165, 0.8);
      }
      .btn:active {
        transform: scale(0.97);
        box-shadow: 0 0 6px rgba(76, 237, 165, 0.8);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: default;
        box-shadow: none;
      }
      .hint {
        margin-top: 8px;
        font-size: 11px;
        opacity: 0.7;
        text-shadow: 0 0 3px rgba(0,0,0,0.8);
      }
      .back-btn {
        position: fixed;
        top: 8px;
        left: 8px;
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        background: rgba(255,255,255,0.08);
        color: #9fe6b8;
        opacity: 0.8;
        z-index: 6;
      }

      @media (max-width: 480px) {
        .gem-wrapper {
          width: 130px;
          height: 130px;
        }
        .gem-glow {
          inset: -24px;
          filter: blur(9px);
        }
        .bar-wrapper {
          width: 90vw;
          max-width: 260px;
        }
      }
    </style>
  </head>
  <body>
    <button class="back-btn" onclick="location.href='/'">Назад</button>

    <div class="streak-label" id="streak-label">Дней серии: {{ streak }}</div>

    <div class="gem-wrapper">
  <div class="gem-glow {% if active_today %}gem-glow-active{% else %}gem-glow-inactive{% endif %}"></div>
  <div class="gem-shape {% if active_today %}gem-active{% else %}gem-inactive{% endif %}"></div>
</div>
    <div class="name">{{ person.name }}</div>
    <div class="level">Уровень {{ level }}</div>
    <div class="subtitle">
      Это ваш общий камень с {{ person.name }}. Каждое действие внутри усиливает его и поднимает уровень.
    </div>

    <div class="bar-wrapper">
  <div class="bar-fill" id="bar"></div>
</div>
<div class="bar-label" id="label">Заряд камня: {{ progress }}%</div>

<button class="btn" id="card-btn" {% if limit_reached %}disabled{% endif %}>
  {% if limit_reached %}
    Лимит на сегодня исчерпан
  {% else %}
    Отправить знак внимания
  {% endif %}
</button>
<div class="hint">
  Не более {{ max_actions }} знаков внимания в день. Каждый даёт +{{ xp_per_card }}% заряда.
</div>

    <script>
  const btn = document.getElementById("card-btn");
  const bar = document.getElementById("bar");
  const label = document.getElementById("label");
  const personId = "{{ person_id }}";
  const gemShape = document.querySelector(".gem-shape");
  const gemGlow = document.querySelector(".gem-glow");
  const streakLabel = document.getElementById("streak-label");
  const levelLabel = document.querySelector(".level");

  function applyCommon(data) {
    const p = Math.max(0, Math.min(100, data.progress));
    bar.style.width = p + "%";
    label.textContent = "Заряд камня: " + p + "%";

    if (data.gradient && data.box_shadow && data.halo_bg) {
      gemShape.style.background = data.gradient;
      gemShape.style.boxShadow = data.box_shadow;
      gemGlow.style.background = data.halo_bg;
    }
    if (typeof data.streak_days === "number") {
      streakLabel.textContent = "Дней серии: " + data.streak_days;
    }
    if (typeof data.level === "number") {
      levelLabel.textContent = "Уровень " + data.level;
    }

    if (!data.dev_mode && !data.limit_reached) {
      gemShape.classList.remove("gem-inactive");
      gemShape.classList.add("gem-active");
      gemGlow.classList.remove("gem-glow-inactive");
      gemGlow.classList.add("gem-glow-active");
    }
  }

  btn.addEventListener("click", async () => {
    try {
      const response = await fetch("/send_card/" + personId, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({})
      });
      const data = await response.json();
      applyCommon(data);

      if (!data.dev_mode && data.limit_reached) {
        btn.disabled = true;
        btn.textContent = "Лимит на сегодня исчерпан";
      } else {
        btn.disabled = false;
        btn.textContent = "Отправить знак внимания";
      }
    } catch (e) {
      console.error(e);
    }
  });
</script>
  </body>
</html>
